<div
    x-data="{ open: false, closeTimer: null }"
    @mouseenter="clearTimeout(closeTimer); open = true"
    @mouseleave="closeTimer = setTimeout(() => { open = false }, 120)"
    class="relative"
>
    <button
        type="button"
        class="inline-flex items-center gap-2 rounded-xl px-4 py-2 text-sm font-medium text-slate-700 transition hover:bg-slate-100 hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white"
    >
        <i class="fas fa-database"></i>
        <span class="inline-block w-8 text-left">Data</span>
            <i class="fas fa-chevron-down text-xs transition duration-200"
              :class="open ? 'rotate-180' : ''"></i>
    </button>

    <div
        x-show="open"
        x-transition
        x-cloak
        class="absolute left-0 z-50 mt-3 w-96 rounded-2xl border border-slate-200 bg-white p-2 shadow-panel dark:border-slate-700 dark:bg-slate-900"
    >
        <a
            href="{% url 'data:incoming_file_list' %}"
            class="flex items-center gap-3 rounded-xl px-3 py-3 text-sm text-slate-700 transition hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800"
        >
            <i class="fas fa-file-import w-4 text-center text-sky-500 dark:text-sky-400"></i>
            <div class="min-w-0">
                <p class="font-medium">Incoming Files</p>
                <p class="text-xs text-slate-500 dark:text-slate-400">
                    Review discovered, loaded, failed, and missing incoming files
                </p>
            </div>
        </a>

        <a
            href="{% url 'data:expected_file_list' %}"
            class="flex items-center gap-3 rounded-xl px-3 py-3 text-sm text-slate-700 transition hover:bg-slate-100 dark:text-slate-200 dark:hover:bg-slate-800"
        >
            <i class="fas fa-calendar-check w-4 text-center text-amber-500 dark:text-amber-400"></i>
            <div class="min-w-0">
                <p class="font-medium">Expected Files</p>
                <p class="text-xs text-slate-500 dark:text-slate-400">
                    Review pending, late, found, and missing expected files
                </p>
            </div>
        </a>
    </div>
</div>
