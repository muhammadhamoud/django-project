<section class="rounded-[2rem] border border-white/10 bg-slate-950 p-6 shadow-soft sm:p-8 text-white">

    <h2 class="mt-3 text-2xl font-black tracking-tight">
        Join our mailing list
    </h2>

    <p class="mt-3 text-sm leading-7 text-white/70">
        Get updates, product news, and helpful insights delivered to your inbox.
    </p>

    <form method="post" action="{% url 'communication:subscribe' %}" class="mt-6 grid gap-4 md:grid-cols-[1fr_auto_auto]">
        {% csrf_token %}

        <input type="hidden" name="action" value="subscribe">
        <input type="text" name="honeypot" class="hidden" tabindex="-1" autocomplete="off">

        <input
            type="email"
            name="email"
            required
            placeholder="Your email address"
            class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition placeholder:text-white/40 focus:border-brand-400 focus:ring-4 focus:ring-brand-500/20"
        >

        <button type="submit"
            class="inline-flex items-center justify-center rounded-2xl bg-white text-slate-900 px-6 py-3 text-sm font-bold transition hover:bg-brand-500 hover:text-white">
            Subscribe
        </button>

        <a href="{% url 'communication:subscribe' %}"
           class="inline-flex items-center justify-center rounded-2xl border border-white/10 px-6 py-3 text-sm font-bold text-white/80 transition hover:border-brand-400 hover:text-brand-400">
            Manage
        </a>

    </form>
</section>
