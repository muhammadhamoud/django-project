<section class="rounded-[2rem] border border-slate-200 bg-white p-6 shadow-soft dark:border-slate-800 dark:bg-slate-900 sm:p-8">
    <div class="max-w-2xl">
        <p class="text-sm font-bold uppercase tracking-[0.25em] text-brand-600 dark:text-brand-400">Newsletter</p>
        <h2 class="mt-3 text-2xl font-black tracking-tight text-slate-950 dark:text-white">
            Join our mailing list
        </h2>
        <p class="mt-3 text-sm leading-7 text-slate-500 dark:text-slate-400">
            Get updates, product news, and helpful insights delivered to your inbox.
        </p>
    </div>

    <form method="post" action="{% url 'communication:subscribe' %}" class="mt-6 grid gap-4 md:grid-cols-[1fr_auto_auto]">
        {% csrf_token %}
        <input type="hidden" name="action" value="subscribe">
        <input type="text" name="honeypot" class="hidden" tabindex="-1" autocomplete="off">

        <input
            type="email"
            name="email"
            required
            placeholder="Your email address"
            class="w-full rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-brand-400 focus:ring-4 focus:ring-brand-100 dark:border-slate-700 dark:bg-slate-900 dark:text-slate-100 dark:placeholder:text-slate-500 dark:focus:ring-brand-500/20"
        >

        <button type="submit" class="inline-flex items-center justify-center rounded-2xl bg-slate-900 px-6 py-3 text-sm font-bold text-white transition hover:bg-brand-600 dark:bg-brand-600 dark:hover:bg-brand-500">
            Subscribe
        </button>

        <a href="{% url 'communication:subscribe' %}" class="inline-flex items-center justify-center rounded-2xl border border-slate-200 px-6 py-3 text-sm font-bold text-slate-700 transition hover:border-brand-400 hover:text-brand-600 dark:border-slate-700 dark:text-slate-200 dark:hover:border-brand-500 dark:hover:text-brand-400">
            Manage
        </a>
    </form>
</section>
