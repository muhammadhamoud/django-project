<section id="team" class="rounded-[2rem] border border-slate-200 bg-white p-8 shadow-soft dark:border-slate-800 dark:bg-slate-900 sm:p-10">
    <p class="text-sm font-bold uppercase tracking-[0.25em] text-brand-600 dark:text-brand-400">Team Members</p>
    <h2 class="mt-3 text-3xl font-black tracking-tight text-slate-950 dark:text-white">The people behind the excellence.</h2>

    <div class="mt-8 grid gap-6 md:grid-cols-2 xl:grid-cols-4">
        {% block teammembers %}
        {% for member in teammembers %}
        <div class="rounded-[1.5rem] border border-slate-200 bg-white p-6 text-center shadow-soft dark:border-slate-800 dark:bg-slate-900">
            <div class="mx-auto h-24 w-24 rounded-full bg-slate-100 dark:bg-slate-800"></div>
            <h3 class="mt-4 text-lg font-bold text-slate-900 dark:text-white">{{ member.name }}</h3>
            <p class="mt-1 text-sm text-brand-600 dark:text-brand-400">{{ member.role }}</p>
        </div>
        {% empty %}
        <div class="rounded-[1.5rem] border border-slate-200 bg-white p-6 text-center shadow-soft dark:border-slate-800 dark:bg-slate-900">
            <div class="mx-auto h-24 w-24 rounded-full bg-slate-100 dark:bg-slate-800"></div>
            <h3 class="mt-4 text-lg font-bold text-slate-900 dark:text-white">Creative Lead</h3>
            <p class="mt-1 text-sm text-brand-600 dark:text-brand-400">Design Strategy</p>
        </div>
        <div class="rounded-[1.5rem] border border-slate-200 bg-white p-6 text-center shadow-soft dark:border-slate-800 dark:bg-slate-900">
            <div class="mx-auto h-24 w-24 rounded-full bg-slate-100 dark:bg-slate-800"></div>
            <h3 class="mt-4 text-lg font-bold text-slate-900 dark:text-white">Tech Lead</h3>
            <p class="mt-1 text-sm text-brand-600 dark:text-brand-400">Django Engineering</p>
        </div>
        <div class="rounded-[1.5rem] border border-slate-200 bg-white p-6 text-center shadow-soft dark:border-slate-800 dark:bg-slate-900">
            <div class="mx-auto h-24 w-24 rounded-full bg-slate-100 dark:bg-slate-800"></div>
            <h3 class="mt-4 text-lg font-bold text-slate-900 dark:text-white">Growth Analyst</h3>
            <p class="mt-1 text-sm text-brand-600 dark:text-brand-400">Analytics</p>
        </div>
        <div class="rounded-[1.5rem] border border-slate-200 bg-white p-6 text-center shadow-soft dark:border-slate-800 dark:bg-slate-900">
            <div class="mx-auto h-24 w-24 rounded-full bg-slate-100 dark:bg-slate-800"></div>
            <h3 class="mt-4 text-lg font-bold text-slate-900 dark:text-white">Client Success</h3>
            <p class="mt-1 text-sm text-brand-600 dark:text-brand-400">Support</p>
        </div>
        {% endfor %}
        {% endblock %}
    </div>
</section>
