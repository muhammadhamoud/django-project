<section id="offerings" class="rounded-[2rem] border border-slate-200 bg-gradient-to-br from-slate-950 to-slate-900 p-8 text-white shadow-soft sm:p-10">
    <p class="text-sm font-bold uppercase tracking-[0.25em] text-brand-300">Offerings</p>
    <h2 class="mt-3 text-3xl font-black tracking-tight">Solutions tailored to your market and audience.</h2>
    <div class="mt-8 grid gap-6 md:grid-cols-2">
        {% block offerings %}
        <div class="rounded-[1.5rem] border border-white/10 bg-white/5 p-6">
            <h3 class="text-xl font-bold">Starter Growth Package</h3>
            <p class="mt-3 text-sm leading-7 text-white/75">Ideal for launching a sharp online presence quickly and professionally.</p>
        </div>
        <div class="rounded-[1.5rem] border border-white/10 bg-white/5 p-6">
            <h3 class="text-xl font-bold">Enterprise Digital Presence</h3>
            <p class="mt-3 text-sm leading-7 text-white/75">For established brands that need stronger messaging, structure, and trust.</p>
        </div>
        {% endblock %}
    </div>
</section>
