{% extends "homepage/base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4 py-10 sm:px-6 lg:px-8">
    <div class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-lg dark:border-slate-800 dark:bg-slate-900 dark:shadow-2xl">

        <h3 class="mb-4 text-center text-xl font-semibold text-slate-900 dark:text-white">
            Create Account
        </h3>

        {% if messages %}
            <div class="mb-4 space-y-2">
                {% for message in messages %}
                    <div class="rounded-lg px-4 py-2 text-sm
                        {% if 'success' in message.tags %}
                            bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-300
                        {% elif 'error' in message.tags %}
                            bg-red-100 text-red-800 dark:bg-red-900/30 dark:text-red-300
                        {% elif 'warning' in message.tags %}
                            bg-yellow-100 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300
                        {% else %}
                            bg-slate-100 text-slate-800 dark:bg-slate-800 dark:text-slate-200
                        {% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">
                    First Name
                </label>
                <input
                    type="text"
                    name="first_name"
                    placeholder="Enter first name"
                    required
                    class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:border-slate-700 dark:bg-slate-950 dark:text-white dark:placeholder-slate-500"
                >
            </div>

            <div>
                <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">
                    Last Name
                </label>
                <input
                    type="text"
                    name="last_name"
                    placeholder="Enter last name"
                    required
                    class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:border-slate-700 dark:bg-slate-950 dark:text-white dark:placeholder-slate-500"
                >
            </div>
            
            <div>
                <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">
                    Email
                </label>
                <input
                    type="email"
                    name="email"
                    placeholder="Enter email"
                    required
                    class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:border-slate-700 dark:bg-slate-950 dark:text-white dark:placeholder-slate-500"
                >
            </div>

            <div>
                <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">
                    Password
                </label>
                <input
                    type="password"
                    name="password"
                    placeholder="Create password"
                    required
                    class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:border-slate-700 dark:bg-slate-950 dark:text-white dark:placeholder-slate-500"
                >
            </div>

            <div>
                <label class="mb-1 block text-sm font-medium text-slate-700 dark:text-slate-300">
                    Confirm Password
                </label>
                <input
                    type="password"
                    name="confirm_password"
                    placeholder="Confirm password"
                    required
                    class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 dark:border-slate-700 dark:bg-slate-950 dark:text-white dark:placeholder-slate-500"
                >
            </div>

            <button
                type="submit"
                class="w-full rounded-lg bg-brand-600 py-2 text-white transition hover:bg-brand-700"
            >
                Register
            </button>
        </form>

        <div class="mt-4 text-center text-sm text-slate-600 dark:text-slate-400">
            Already have an account?
            <a href="{% url 'accounts:login' %}" class="text-brand-600 hover:underline dark:text-brand-400">
                Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
