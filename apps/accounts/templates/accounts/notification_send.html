{% extends 'base.html' %}

{% block content %}
<div class="mx-auto max-w-4xl">
    <section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-soft dark:border-slate-800 dark:bg-slate-900 sm:p-8">
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-slate-900 dark:text-white">Send Notification</h1>
            <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
                Send a message to selected users or everyone.
            </p>
        </div>

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div>
                <label class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300">Title</label>
                <input type="text" name="title" class="w-full rounded-2xl border border-slate-300 px-4 py-3 dark:border-slate-700 dark:bg-slate-950 dark:text-white" required>
            </div>

            <div>
                <label class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300">Message</label>
                <textarea name="message" rows="5" class="w-full rounded-2xl border border-slate-300 px-4 py-3 dark:border-slate-700 dark:bg-slate-950 dark:text-white" required></textarea>
            </div>

            <div class="grid gap-6 sm:grid-cols-2">
                <div>
                    <label class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300">Level</label>
                    <select name="level" class="w-full rounded-2xl border border-slate-300 px-4 py-3 dark:border-slate-700 dark:bg-slate-950 dark:text-white">
                        <option value="info">Info</option>
                        <option value="success">Success</option>
                        <option value="warning">Warning</option>
                        <option value="error">Error</option>
                    </select>
                </div>

                <div>
                    <label class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300">Alert</label>
                    <select name="alert" class="w-full rounded-2xl border border-slate-300 px-4 py-3 dark:border-slate-700 dark:bg-slate-950 dark:text-white">
                        <option value="no">No</option>
                        <option value="yes">Yes</option>
                    </select>
                </div>

                <div>
                    <label class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300">Optional Link</label>
                    <input type="text" name="link" class="w-full rounded-2xl border border-slate-300 px-4 py-3 dark:border-slate-700 dark:bg-slate-950 dark:text-white" placeholder="/dashboard/">
                </div>
            </div>

            <div class="rounded-2xl border border-slate-200 p-4 dark:border-slate-700">
                <label class="flex items-center gap-3">
                    <input type="checkbox" name="send_to_all" class="rounded border-slate-300 text-brand-600 focus:ring-brand-500">
                    <span class="text-sm text-slate-700 dark:text-slate-300">Send to all active users</span>
                </label>
            </div>

            <div>
                <label class="mb-2 block text-sm font-medium text-slate-700 dark:text-slate-300">Or select users</label>
                <div class="max-h-64 space-y-2 overflow-y-auto rounded-2xl border border-slate-200 p-4 dark:border-slate-700">
                    {% for user in users %}
                    <label class="flex items-center gap-3">
                        <input type="checkbox" name="users" value="{{ user.id }}" class="rounded border-slate-300 text-brand-600 focus:ring-brand-500">
                        <span class="text-sm text-slate-700 dark:text-slate-300">
                            {{ user.first_name }} {{ user.last_name }} — {{ user.email }}
                        </span>
                    </label>
                    {% endfor %}
                </div>
            </div>

            <div class="flex justify-end">
                <button type="submit" class="rounded-2xl bg-brand-600 px-5 py-3 text-sm font-semibold text-white shadow-soft hover:bg-brand-700">
                    Send Notification
                </button>
            </div>
        </form>
    </section>
</div>
{% endblock %}
