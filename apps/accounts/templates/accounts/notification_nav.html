<div class="relative">
    <a
        href="{% url 'accounts:notification_center' %}"
        class="relative inline-flex h-11 w-11 items-center justify-center rounded-2xl border border-slate-200 bg-white/70 text-slate-700 shadow-soft transition hover:bg-white dark:border-white/10 dark:bg-white/5 dark:text-slate-200 dark:hover:bg-white/10"
        aria-label="Notifications"
    >
        <i class="fas fa-bell text-base"></i>

        {% if unread_notification_count > 0 %}
        <span class="absolute -right-1 -top-1 inline-flex h-5 min-w-[1.25rem] items-center justify-center rounded-full bg-red-500 px-1 text-[10px] font-bold leading-none text-white ring-2 ring-white dark:ring-slate-900">
            {% if unread_notification_count > 99 %}
                99+
            {% else %}
                {{ unread_notification_count }}
            {% endif %}
        </span>
        {% endif %}
    </a>
</div>
