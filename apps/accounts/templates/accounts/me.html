<div
    x-data="{ open: false, closeTimer: null }"
    @mouseenter="clearTimeout(closeTimer); open = true"
    @mouseleave="closeTimer = setTimeout(() => open = false, 120)"
    class="relative"
>
    <button
        type="button"
        class="flex items-center gap-3 rounded-2xl border border-slate-200 bg-white/70 px-3 py-2.5 shadow-soft transition hover:bg-white dark:border-white/10 dark:bg-white/5 dark:hover:bg-white/10"
    >
        <div class="hidden text-right sm:block">
            <p class="text-sm font-semibold text-slate-900 dark:text-white">
                {{ request.user.first_name }} {{ request.user.last_name }}
            </p>
            <p class="text-xs text-slate-500 dark:text-slate-400">
                {% if request.user.profile.roles.first %}
                    {{ request.user.profile.roles.first.name }}
                {% else %}
                    User
                {% endif %}
            </p>
        </div>

        <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-brand-500 to-fuchsia-600 text-sm font-bold text-white">
            {{ request.user.first_name|default:request.user.email|slice:":1"|upper }}{{ request.user.last_name|slice:":1"|upper }}
        </div>

        <i class="fas fa-chevron-down text-xs text-slate-400 transition duration-200"
           :class="open ? 'rotate-180' : ''"></i>
    </button>

    <div
        x-show="open"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 translate-y-2 scale-95"
        x-transition:enter-end="opacity-100 translate-y-0 scale-100"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100 translate-y-0 scale-100"
        x-transition:leave-end="opacity-0 translate-y-2 scale-95"
        x-cloak
        class="absolute right-0 z-50 mt-3 w-64 overflow-hidden rounded-3xl border border-slate-200 bg-white/95 p-2 shadow-panel backdrop-blur dark:border-slate-700 dark:bg-slate-900/95"
    >
        <div class="rounded-2xl bg-slate-50 px-4 py-3 dark:bg-slate-800/60">
            <p class="text-sm font-semibold text-slate-900 dark:text-white">
                {{ request.user.first_name }} {{ request.user.last_name }}
            </p>
            <p class="mt-1 text-xs text-slate-500 dark:text-slate-400">
                {{ request.user.email }}
            </p>
        </div>

        <div class="mt-2 space-y-1">
            <a
                href="{% url 'accounts:current_user' %}"
                class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-slate-700 transition hover:bg-slate-100 hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white"
            >
                <span class="flex h-9 w-9 items-center justify-center rounded-xl bg-brand-50 text-brand-600 dark:bg-brand-500/10 dark:text-brand-400">
                    <i class="fas fa-user"></i>
                </span>
                <span>My Profile</span>
            </a>

            <a
                href="{% url 'accounts:profile' %}"
                class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-slate-700 transition hover:bg-slate-100 hover:text-slate-900 dark:text-slate-200 dark:hover:bg-slate-800 dark:hover:text-white"
            >
                <span class="flex h-9 w-9 items-center justify-center rounded-xl bg-amber-50 text-amber-600 dark:bg-amber-500/10 dark:text-amber-400">
                    <i class="fas fa-user-cog"></i>
                </span>
                <span>Update Profile</span>
            </a>

            <div class="my-2 border-t border-slate-200 dark:border-slate-700"></div>

            <a
                href="{% url 'accounts:logout' %}"
                class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm font-medium text-rose-600 transition hover:bg-rose-50 dark:text-rose-400 dark:hover:bg-rose-500/10"
            >
                <span class="flex h-9 w-9 items-center justify-center rounded-xl bg-rose-50 text-rose-600 dark:bg-rose-500/10 dark:text-rose-400">
                    <i class="fas fa-sign-out-alt"></i>
                </span>
                <span>Logout</span>
            </a>
        </div>
    </div>
</div>
