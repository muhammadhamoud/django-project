{% load i18n static %}

<header class="sticky top-0 z-50 border-b border-slate-200/70 bg-white/85 backdrop-blur-xl dark:border-slate-800 dark:bg-slate-950/80">
    <div class="mx-auto flex h-20 max-w-7xl items-center justify-between gap-4 px-4 sm:px-6 lg:px-8">
        
        <!-- Logo / Site Name -->
        {% include 'homepage/partials/logo.html' %}

        <!-- Right Side -->
        <div class="flex items-center gap-3">
            {% include 'homepage/partials/theme.html' %}
            <a
                href="#contact"
                class="inline-flex items-center gap-2 rounded-2xl bg-brand-600 px-5 py-2.5 text-sm font-semibold text-white shadow-soft transition hover:bg-brand-700"
            >
                <i class="fas fa-envelope text-xs"></i>
                <span>{% trans "Contact Us" %}</span>
            </a>
        </div>
    </div>
</header>
