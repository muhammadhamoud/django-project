<div class="overflow-hidden rounded-[28px] border border-white/10 bg-white/5 shadow-panel">
    <div class="flex items-center justify-between border-b border-white/10 px-6 py-5">
        <div>
            <h3 class="text-lg font-semibold">{{ table_title|default:'Latest Records' }}</h3>
            <p class="text-sm text-slate-400">{{ table_subtitle|default:'Track important business records' }}</p>
        </div>
        <button class="rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-sm text-slate-300">View all</button>
    </div>

    <div class="overflow-x-auto">
        <table class="min-w-full text-left text-sm">
            <thead class="bg-white/5 text-slate-400">
                <tr>
                    <th class="px-6 py-4 font-medium">Name</th>
                    <th class="px-6 py-4 font-medium">Reference</th>
                    <th class="px-6 py-4 font-medium">Amount</th>
                    <th class="px-6 py-4 font-medium">Status</th>
                    <th class="px-6 py-4 font-medium">Date</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-white/5 text-slate-200">
                {% for row in table_rows %}
                <tr class="hover:bg-white/5">
                    <td class="px-6 py-4">{{ row.name }}</td>
                    <td class="px-6 py-4">{{ row.reference }}</td>
                    <td class="px-6 py-4">{{ row.amount }}</td>
                    <td class="px-6 py-4">
                        <span class="rounded-full px-3 py-1 text-xs font-semibold {{ row.status_class }}">{{ row.status }}</span>
                    </td>
                    <td class="px-6 py-4">{{ row.date }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="5" class="px-6 py-8 text-center text-slate-400">No data available.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
