<div class="rounded-[28px] border border-white/10 bg-white/5 p-6 shadow-panel">
    <div class="mb-6 flex items-center justify-between">
        <div>
            <h3 class="text-lg font-semibold">{{ activity_title|default:'Recent Activity' }}</h3>
            <p class="text-sm text-slate-400">{{ activity_subtitle|default:'Latest platform events' }}</p>
        </div>
    </div>

    <div class="space-y-5">
        {% for item in activities %}
        <div class="flex gap-4">
            <div class="mt-1 h-3 w-3 rounded-full {{ item.dot_color|default:'bg-brand-400' }}"></div>
            <div>
                <p class="text-sm font-medium">{{ item.title }}</p>
                <p class="text-xs text-slate-400">{{ item.time }}</p>
            </div>
        </div>
        {% empty %}
        <p class="text-sm text-slate-400">No recent activity.</p>
        {% endfor %}
    </div>
</div>
