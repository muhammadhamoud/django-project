<aside
    :class="sidebarExpanded ? 'w-72' : 'w-24'"
    class="fixed inset-y-0 left-0 z-40 hidden border-r border-slate-200/70 bg-white/80 glass transition-all duration-300 ease-out dark:border-white/10 dark:bg-slate-900/80 lg:flex lg:flex-col"
>
    <div class="flex h-20 items-center justify-between border-b border-white/10 px-5">
        <div class="flex items-center gap-3 overflow-hidden">
            <div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-2xl bg-gradient-to-br from-brand-500 to-violet-600 shadow-panel">
                <svg class="h-6 w-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 7.5 12 3l9 4.5M4.5 9.75V16.5L12 21l7.5-4.5V9.75M12 12l9-4.5M12 12 3 7.5"/>
                </svg>
            </div>
            <div x-show="sidebarExpanded" x-transition class="min-w-0">
                <h1 class="truncate text-base font-bold tracking-wide">Orion Admin</h1>
                <p class="truncate text-xs text-slate-400">Intelligent Dashboard</p>
            </div>
        </div>
        <button @click="sidebarExpanded = !sidebarExpanded" class="hidden rounded-xl border border-white/10 bg-white/5 p-2 text-slate-300 transition hover:bg-white/10 lg:inline-flex">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5"/>
            </svg>
        </button>
    </div>

    <div class="flex-1 overflow-y-auto px-4 py-6">
        <div class="space-y-8">
            <div>
                <p x-show="sidebarExpanded" x-transition class="mb-3 px-3 text-[11px] font-semibold uppercase tracking-[0.2em] text-slate-500">Main</p>
                <nav class="space-y-2">
                    <a href="{% url 'dashboard:home' %}" class="group flex items-center gap-3 rounded-2xl px-3 py-3 text-sm font-medium transition {% if request.resolver_match.url_name == 'home' %}bg-gradient-to-r from-brand-600 to-violet-600 text-white shadow-panel{% else %}text-slate-300 hover:bg-white/5 hover:text-white{% endif %}">
                        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl {% if request.resolver_match.url_name == 'home' %}bg-white/10{% else %}bg-slate-800{% endif %}">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v18h18M8.25 14.25l3-3 2.25 2.25 4.5-6"/></svg>
                        </span>
                        <span x-show="sidebarExpanded" x-transition>Overview</span>
                    </a>

                    <a href="{% url 'dashboard:analytics' %}" class="group flex items-center gap-3 rounded-2xl px-3 py-3 text-sm font-medium transition {% if request.resolver_match.url_name == 'analytics' %}bg-gradient-to-r from-brand-600 to-violet-600 text-white shadow-panel{% else %}text-slate-300 hover:bg-white/5 hover:text-white{% endif %}">
                        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl {% if request.resolver_match.url_name == 'analytics' %}bg-white/10{% else %}bg-slate-800{% endif %}">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M6.75 3.75v16.5"/></svg>
                        </span>
                        <span x-show="sidebarExpanded" x-transition>Analytics</span>
                    </a>

                    <a href="{% url 'reports:group_list' %}" class="group flex items-center gap-3 rounded-2xl px-3 py-3 text-sm font-medium transition {% if request.resolver_match.url_name == 'reports' %}bg-gradient-to-r from-brand-600 to-violet-600 text-white shadow-panel{% else %}text-slate-300 hover:bg-white/5 hover:text-white{% endif %}">
                        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl {% if request.resolver_match.url_name == 'reports' %}bg-white/10{% else %}bg-slate-800{% endif %}">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 6h9m-9 6h9m-9 6h5.25"/></svg>
                        </span>
                        <span x-show="sidebarExpanded" x-transition>Reports</span>
                    </a>

                    <a href="{% url 'accounts:user_list' %}" class="group flex items-center gap-3 rounded-2xl px-3 py-3 text-sm font-medium transition {% if request.resolver_match.url_name == 'users' %}bg-gradient-to-r from-brand-600 to-violet-600 text-white shadow-panel{% else %}text-slate-300 hover:bg-white/5 hover:text-white{% endif %}">
                        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl {% if request.resolver_match.url_name == 'users' %}bg-white/10{% else %}bg-slate-800{% endif %}">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.75a3 3 0 1 0-6 0m6 0v.75H12v-.75m6 0v-.75A4.5 4.5 0 0 0 13.5 13.5h-3A4.5 4.5 0 0 0 6 18v.75m12 0H6"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
                        </span>
                        <span x-show="sidebarExpanded" x-transition>Settings</span>
                    </a>

                    <a href="{% url 'accounts:user_list' %}" class="group flex items-center gap-3 rounded-2xl px-3 py-3 text-sm font-medium transition {% if request.resolver_match.url_name == 'users' %}bg-gradient-to-r from-brand-600 to-violet-600 text-white shadow-panel{% else %}text-slate-300 hover:bg-white/5 hover:text-white{% endif %}">
                        <span class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl {% if request.resolver_match.url_name == 'users' %}bg-white/10{% else %}bg-slate-800{% endif %}">
                            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.75a3 3 0 1 0-6 0m6 0v.75H12v-.75m6 0v-.75A4.5 4.5 0 0 0 13.5 13.5h-3A4.5 4.5 0 0 0 6 18v.75m12 0H6"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z"/></svg>
                        </span>
                        <span x-show="sidebarExpanded" x-transition>Users</span>
                    </a>
                </nav>
            </div>
        </div>
    </div>

    <div class="border-t border-white/10 p-4">
        <div class="rounded-3xl border border-white/10 bg-white/5 p-4 shadow-soft">
            <div class="flex items-center gap-3">
                <div class="h-11 w-11 rounded-2xl bg-gradient-to-br from-emerald-400 to-cyan-500"></div>
                <div x-show="sidebarExpanded" x-transition class="min-w-0">
                    <p class="truncate text-sm font-semibold">Premium Workspace</p>
                    <p class="truncate text-xs text-slate-400">Advanced insights enabled</p>
                </div>
            </div>
        </div>
    </div>
</aside>

<aside x-show="mobileSidebarOpen" x-cloak x-transition:enter="transition ease-out duration-300" x-transition:enter-start="-translate-x-full opacity-0" x-transition:enter-end="translate-x-0 opacity-100" x-transition:leave="transition ease-in duration-200" x-transition:leave-start="translate-x-0 opacity-100" x-transition:leave-end="-translate-x-full opacity-0" class="fixed inset-y-0 left-0 z-50 flex w-72 flex-col border-r border-slate-200 bg-white/95 glass dark:border-white/10 dark:bg-slate-900/95 lg:hidden">
    <div class="flex h-20 items-center justify-between border-b border-white/10 px-5">
        <div>
            <h2 class="text-base font-bold">Orion Admin</h2>
            <p class="text-xs text-slate-400">Dashboard Workspace</p>
        </div>
        <button @click="mobileSidebarOpen = false" class="rounded-xl border border-white/10 bg-white/5 p-2">
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
            </svg>
        </button>
    </div>
    <div class="flex-1 overflow-y-auto p-4">
        <nav class="space-y-2">
            <a href="{% url 'dashboard:home' %}" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm {% if request.resolver_match.url_name == 'home' %}bg-gradient-to-r from-brand-600 to-violet-600 font-semibold text-white{% else %}text-slate-300 hover:bg-white/5{% endif %}">Overview</a>
            <a href="{% url 'dashboard:analytics' %}" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm {% if request.resolver_match.url_name == 'analytics' %}bg-gradient-to-r from-brand-600 to-violet-600 font-semibold text-white{% else %}text-slate-300 hover:bg-white/5{% endif %}">Analytics</a>
            <a href="{% url 'reports:group_list' %}" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm {% if request.resolver_match.url_name == 'reports' %}bg-gradient-to-r from-brand-600 to-violet-600 font-semibold text-white{% else %}text-slate-300 hover:bg-white/5{% endif %}">Reports</a>
            <a href="{% url 'accounts:user_list' %}" class="flex items-center gap-3 rounded-2xl px-4 py-3 text-sm {% if request.resolver_match.url_name == 'users' %}bg-gradient-to-r from-brand-600 to-violet-600 font-semibold text-white{% else %}text-slate-300 hover:bg-white/5{% endif %}">Users</a>
        </nav>
    </div>
</aside>
