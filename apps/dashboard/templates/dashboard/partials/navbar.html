<header class="sticky top-0 z-20 border-b border-slate-200/70 bg-white/70 glass dark:border-white/10 dark:bg-slate-950/60">
    <div class="flex h-20 items-center justify-between gap-4 px-4 sm:px-6 lg:px-8">
        <div class="flex items-center gap-3">
            <button @click="mobileSidebarOpen = true" class="inline-flex rounded-2xl border border-slate-200 bg-white/70 p-2.5 text-slate-700 lg:hidden dark:border-white/10 dark:bg-white/5 dark:text-slate-300">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5"/>
                </svg>
            </button>

            <div>
                <h2 class="text-xl font-bold tracking-tight text-slate-900 sm:text-2xl dark:text-white">
                    {{ page_title|default:"Dashboard Overview" }}
                </h2>
                <p class="mt-1 text-sm text-slate-500 dark:text-slate-400">
                    {{ page_subtitle|default:"Monitor your platform, users, and live business metrics." }}
                </p>
            </div>

        </div>

        <div class="flex items-center gap-3">
            <div class="hidden items-center gap-2 rounded-2xl border border-slate-200 bg-white/70 p-1 md:flex dark:border-white/10 dark:bg-white/5">
                <button @click="setTheme('light')" :class="theme === 'light' ? 'bg-slate-900 text-white dark:bg-white dark:text-slate-900' : 'text-slate-600 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white'" class="rounded-xl px-3 py-2 text-xs font-semibold transition">Light</button>
                <button @click="setTheme('dark')" :class="theme === 'dark' ? 'bg-slate-900 text-white dark:bg-white dark:text-slate-900' : 'text-slate-600 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white'" class="rounded-xl px-3 py-2 text-xs font-semibold transition">Dark</button>
                <button @click="setTheme('auto')" :class="theme === 'auto' ? 'bg-slate-900 text-white dark:bg-white dark:text-slate-900' : 'text-slate-600 hover:text-slate-900 dark:text-slate-300 dark:hover:text-white'" class="rounded-xl px-3 py-2 text-xs font-semibold transition">Auto</button>
            </div>

            <div class="hidden items-center gap-3 rounded-2xl border border-slate-200 bg-white/70 px-4 py-2.5 md:flex dark:border-white/10 dark:bg-white/5">
                <svg class="h-4 w-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-4.35-4.35m1.6-5.15a6.75 6.75 0 1 1-13.5 0 6.75 6.75 0 0 1 13.5 0Z"/>
                </svg>
                <input type="text" placeholder="Search anything..." class="w-56 bg-transparent text-sm text-slate-900 placeholder:text-slate-400 focus:outline-none dark:text-white dark:placeholder:text-slate-500">
            </div>

            <button class="relative rounded-2xl border border-slate-200 bg-white/70 p-3 text-slate-700 hover:bg-white dark:border-white/10 dark:bg-white/5 dark:text-slate-300 dark:hover:bg-white/10">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9a6 6 0 1 0-12 0v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.561 1.084 5.454 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0"/>
                </svg>
                <span class="absolute right-2 top-2 h-2.5 w-2.5 rounded-full bg-rose-500"></span>
            </button>

            {% include 'accounts/me.html' %}
            <!-- <div class="flex items-center gap-3 rounded-2xl border border-slate-200 bg-white/70 px-3 py-2.5 shadow-soft dark:border-white/10 dark:bg-white/5">
                <div class="hidden text-right sm:block">
                    <p class="text-sm font-semibold text-slate-900 dark:text-white">Admin User</p>
                    <p class="text-xs text-slate-500 dark:text-slate-400">Super Admin</p>
                </div>
                <div class="h-11 w-11 rounded-2xl bg-gradient-to-br from-brand-500 to-fuchsia-600"></div>
            </div> -->

        </div>
    </div>
</header>
