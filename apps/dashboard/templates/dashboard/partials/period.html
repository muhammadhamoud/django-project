<div class="flex flex-wrap items-center justify-between gap-3">
    <div class="inline-flex flex-wrap items-center rounded-2xl border border-slate-200 bg-slate-100 p-1 dark:border-white/10 dark:bg-white/5">
        {% for item in period_links %}
            <a
                href="?{{ item.querystring }}"
                class="rounded-xl px-3 py-1.5 text-xs font-medium transition
                {% if item.is_active %}
                    bg-white text-slate-900 shadow-sm dark:bg-white/10 dark:text-white
                {% else %}
                    text-slate-600 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white
                {% endif %}"
            >
                {{ item.label }}
            </a>
        {% endfor %}

        <form method="get" class="ml-1 inline-flex flex-wrap items-center gap-2 rounded-xl px-2 py-1">
            <input type="hidden" name="group" value="{{ active_group }}">
            <input type="hidden" name="period" value="{{ active_period }}">

            {% for card in current_group.cards %}
                <input type="hidden" name="{{ card.card_key }}_metric" value="{{ card.active_option_key }}">
            {% endfor %}

            <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg text-slate-600 dark:text-slate-300">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" class="h-4 w-4">
                    <rect x="3" y="5" width="18" height="16" rx="2"></rect>
                    <path d="M16 3v4"></path>
                    <path d="M8 3v4"></path>
                    <path d="M3 10h18"></path>
                </svg>
            </span>

            <input
                type="date"
                name="start_date"
                value="{{ start_date }}"
                class="rounded-lg border border-slate-200 bg-white px-2 py-1.5 text-xs text-slate-700 outline-none dark:border-white/10 dark:bg-white/10 dark:text-slate-200"
            >

            <span class="text-xs text-slate-500 dark:text-slate-400">to</span>

            <input
                type="date"
                name="end_date"
                value="{{ end_date }}"
                class="rounded-lg border border-slate-200 bg-white px-2 py-1.5 text-xs text-slate-700 outline-none dark:border-white/10 dark:bg-white/10 dark:text-slate-200"
            >

            <button
                type="submit"
                class="rounded-lg bg-white px-3 py-1.5 text-xs font-medium text-slate-900 shadow-sm transition hover:text-slate-900 dark:bg-white/10 dark:text-white"
            >
                Apply
            </button>
        </form>
    </div>
</div>
