<div class="rounded-[28px] border border-white/10 bg-white/5 p-5 shadow-lg">
    <div class="flex items-start justify-between">
        <div>
            <p class="text-sm text-slate-400">{{ title }}</p>
            <h3 class="mt-3 text-3xl font-bold">{{ value }}</h3>
        </div>
        <div class="rounded-2xl px-3 py-3 text-sm font-semibold {{ icon_bg|default:'bg-brand-500/10 text-brand-300' }}">
            {{ icon|default:'◎' }}
        </div>
    </div>
    <p class="mt-4 text-sm {{ trend_color|default:'text-brand-300' }}">{{ trend }}</p>
</div>
